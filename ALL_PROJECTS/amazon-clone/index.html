<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="nav-logo border">
          <div class="logo"></div>
            </div>
             <div class="nav-address border1">
            <p>Deliver to</p>
            <div class="add-icon">
              <i class="fa-solid fa-location-dot"></i>
              <p>India</p>
          </div>
        </div>
        <div class="nav-search">
          <select class="search-select">
            <option>ALL</option>
          </select>
          <input placeholder="Search Amazon" class="search-input"></input>
          <div class="search-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
        <div class="nav-signin border1">
          <p><span>Hello,sign in</span></p>
          <p class="nav-second">Account & Lists</p>
        </div>
         <div class="nav-return border1">
          <p><span>Returns</span></p>
          <p class="nav-second">& Orders</p>
        </div>
        <div class="nav-cart border1">
          <i class="fa-solid fa-cart-shopping"></i>Cart
        </div>
      </div>
      <div class="pannel">
        <div class="panel-all">
          <i class="fa-solid fa-bars"></i>
         <span>All</span>
        </div>
        <div class="panel-ops">
          <a href="#">Today's Deals</a>
          <a href="#">Gift Cards</a>
          <a href="#">Sell</a>
          <a href="#">Registry</a>
          <a href="#">Prime video</a>
          <a href="#">Custmor Service</a>
          <div class="panel-deals">
            Shop deals in Electronics
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
