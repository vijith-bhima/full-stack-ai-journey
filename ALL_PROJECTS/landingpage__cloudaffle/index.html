<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home page- cloudaffle Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/css-reset.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      rel="stylesheet"
      media="screen and (max-width: 480px)"
      href="./styles/mobile.css"
    />
    <link rel="stylesheet" 
    media="screen and (min-width:481px) and (max-width:980px)"
    href="./styles/tablet.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search"
    />
  </head>
  <body>
    <header class="header">
      <div class="header-wrapper">
        <img
          class="logo"
          src="./images/cloudaffle-logo 1.png"
          alt="website-logo"
        />
        <nav class="navbar">
          <ul class="nav-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#"> Single post</a></li>
            <li><a href="#">Pages</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
        <span class="search-container">
          <input type="text" placeholder="search" class="search-input" />
          <span class="material-symbols-outlined search-icon"> search </span>
        </span>
      </div>
    </header>
    <main class="main-section">
      <section class="hero-section">
        <div class="hero-image"></div>
        <div class="hero-description">
          <article class="article-details">
            <div class="badge-container">
              <span class="hero-badge">Technology</span>
            </div>
            <h1>
              <a href="#"
                >The Imapact of Technology on the Workspace: How Technology is
                Changing</a
              >
            </h1>
            <div class="auother-section">
              <img src="./images/auother.png" alt="auother" />
              <span class="auother-name">Jason Francisco</span>
              <span class="auother-date">May 15, 2026</span>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
